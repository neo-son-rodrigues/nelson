<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Estúdio Alteranelson</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --bg-dark: #1a1423;
    --floor: #2b2440;
    --floor-alt: #342c4d;
    --accent: #ffd000;
    --accent-2: #3ec1d3;
    --panel-bg: #14101f;
    --panel-border: #ffd000;
    --text: #f2ede4;
    --muted: #9b8fb5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    font-size: 14px;
    color: var(--accent);
    text-shadow: 3px 3px 0 #7a5c00;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-align: center;
  }

  #hint {
    font-size: 8px;
    color: var(--muted);
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.8;
  }

  #gameWrap {
    position: relative;
    border: 6px solid #000;
    outline: 3px solid var(--accent);
    box-shadow: 0 0 0 6px #000, 0 12px 30px rgba(0,0,0,0.6);
    image-rendering: pixelated;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    background: var(--floor);
    cursor: crosshair;
  }

  /* --- Painel retrô --- */
  #panelOverlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 6, 20, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  #panelOverlay.active { display: flex; }

  #panelBox {
    width: min(560px, 92vw);
    max-height: 82vh;
    overflow-y: auto;
    background: var(--panel-bg);
    border: 5px solid var(--panel-border);
    box-shadow: 0 0 0 4px #000, 0 0 30px rgba(255,208,0,0.25);
    padding: 20px;
    position: relative;
  }

  #panelBox::-webkit-scrollbar { width: 10px; }
  #panelBox::-webkit-scrollbar-thumb { background: var(--accent); }
  #panelBox::-webkit-scrollbar-track { background: #000; }

  #panelClose {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    background: #ff4d4d;
    border: 3px solid #000;
    color: #000;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
  }
  #panelClose:hover { background: #ff8080; }

  #panelTitle {
    font-size: 13px;
    color: var(--accent);
    margin: 0 0 6px 0;
    padding-right: 30px;
  }
  #panelSub {
    font-size: 8px;
    color: var(--accent-2);
    margin-bottom: 16px;
  }
  #panelBody {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }
  #panelBody .stat {
    display: inline-block;
    background: #241c38;
    border: 2px solid var(--accent-2);
    padding: 6px 10px;
    margin: 4px 6px 4px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
  }
  #panelBody .stat b { display:block; color: var(--accent); font-size: 12px; margin-bottom:4px;}
  #panelBody a {
    color: var(--accent-2);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent-2);
  }
  #panelBody a:hover { color: var(--accent); border-color: var(--accent); }
  #panelBody ul { padding-left: 18px; margin: 6px 0 14px; }
  #panelBody li { margin-bottom: 6px; }
  #panelBody .item-card {
    border: 2px solid #3a2f57;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: #1e1830;
  }
  #panelBody .item-card .cat {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--accent-2);
    display:block;
    margin-bottom: 4px;
  }

  /* --- TV de tubo (só sala de vídeos) --- */
  #tvWrap {
    background: #3a3a3a;
    border-radius: 18px;
    border: 4px solid #1a1a1a;
    padding: 16px 16px 26px;
    margin: 6px 0 14px;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 6px 0 #111;
  }
  #tvScreen {
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 4/3;
    border: 3px solid #000;
  }
  #tvScreen iframe { width: 100%; height: 100%; border: 0; position: relative; z-index: 1; }
  #tvScreen .scanline-overlay {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.15) 3px);
    pointer-events: none;
    z-index: 2;
  }
  #tvScreen.powering-on {
    animation: tvOn 0.5s ease-out;
  }
  @keyframes tvOn {
    0% { transform: scaleY(0.01); background:#fff; opacity: 1; }
    30% { transform: scaleY(0.01); background:#fff; }
    60% { transform: scaleY(1); background:#000; }
    100% { transform: scaleY(1); }
  }
  #tvControls {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .channelBtn {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    background: #241c38;
    color: var(--text);
    border: 2px solid var(--accent-2);
    padding: 6px 8px;
    cursor: pointer;
  }
  .channelBtn:hover, .channelBtn.active { background: var(--accent-2); color:#000; }
  #tvKnobs { position:absolute; right: 12px; top: 12px; display:flex; gap:6px; }
  .knob { width:10px; height:10px; border-radius:50%; background:#666; border:2px solid #111; }

  /* ---- Animações de entrada temáticas por sala ---- */
  .content-reveal { opacity: 0; animation: fadeUp 0.4s ease forwards; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  /* Recepção: atendente + balão de chat */
  .attendant-row { display:flex; align-items:flex-end; gap:10px; margin-bottom:16px; }
  .pixel-avatar { width:34px; height:46px; position:relative; flex-shrink:0; }
  .pixel-avatar .head { position:absolute; top:0; left:7px; width:20px; height:18px; background:#e3a97a; border:2px solid #000; }
  .pixel-avatar .hair { position:absolute; top:-3px; left:5px; width:24px; height:10px; background:#2b1c12; border:2px solid #000; }
  .pixel-avatar .body { position:absolute; top:16px; left:2px; width:30px; height:30px; background:#3a6ea5; border:2px solid #000; }
  .speech-bubble {
    background:#fff; color:#111; border:3px solid #000; padding:8px 12px;
    font-family:'Courier New', monospace; font-size:12px; position:relative; max-width:280px;
    opacity:0; animation: bubbleIn 0.35s ease forwards; animation-delay:0.25s;
  }
  .speech-bubble::after {
    content:''; position:absolute; left:-10px; bottom:10px;
    border:6px solid transparent; border-right-color:#000;
  }
  @keyframes bubbleIn { from{opacity:0; transform:scale(0.85) translateY(8px);} to{opacity:1; transform:scale(1) translateY(0);} }

  /* Mesa de Design: monitor ligando */
  .pc-monitor { width:96px; height:66px; background:#1a1a1a; border:3px solid #000; border-radius:4px; margin:0 auto 16px; padding:5px; }
  .pc-screen {
    width:100%; height:100%; transform: scaleY(0.03); transform-origin:center;
    animation-name: pcPowerOn; animation-duration:0.5s; animation-timing-function:ease-out;
    animation-delay:0.15s; animation-fill-mode:forwards;
  }
  @keyframes pcPowerOn {
    0% { transform:scaleY(0.03); background:#fff; }
    35% { transform:scaleY(0.03); background:#fff; }
    60% { transform:scaleY(1); background:#000; }
    100% { transform:scaleY(1); background:#3ec1d3; }
  }

  /* Vídeos: TV "fora do ar" antes de sintonizar */
  .tv-static-overlay {
    position:absolute; inset:0; z-index:3;
    background: repeating-linear-gradient(0deg, #d8d8d8 0px, #d8d8d8 1px, #222 2px, #222 3px);
    background-size: 100% 6px;
    display:flex; align-items:center; justify-content:center;
    pointer-events: none;
    animation-name: tvNoiseMove, tvOffAirFade;
    animation-duration: 0.08s, 1s;
    animation-timing-function: linear, steps(1);
    animation-iteration-count: infinite, 1;
    animation-fill-mode: none, forwards;
  }
  .tv-static-overlay span {
    font-family:'Press Start 2P', monospace; font-size:8px; color:#000;
    background:#fff; padding:4px 8px;
  }
  @keyframes tvNoiseMove { from{background-position-y:0;} to{background-position-y:6px;} }
  @keyframes tvOffAirFade { 0%,75%{opacity:1;} 100%{opacity:0;} }

  /* Sala de Reunião: telefone tocando */
  .phone-row { display:flex; justify-content:center; margin-bottom:16px; }
  .phone-icon {
    font-size:36px; display:inline-block;
    animation-name: ringShake, fadeOutIcon;
    animation-duration: 0.22s, 0.3s;
    animation-timing-function: ease-in-out, ease;
    animation-iteration-count: 5, 1;
    animation-delay: 0.1s, 1.2s;
    animation-fill-mode: none, forwards;
  }
  @keyframes ringShake { 0%,100%{transform:rotate(0deg);} 25%{transform:rotate(-18deg);} 75%{transform:rotate(18deg);} }
  @keyframes fadeOutIcon { to { opacity:0; transform:scale(0.5); } }

  /* Estante/Arquivo: bibliotecário entrega um livro */
  .book-delivery { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .librarian-avatar { width:34px; height:46px; position:relative; flex-shrink:0; }
  .librarian-avatar .head { position:absolute; top:0; left:7px; width:20px; height:18px; background:#e3a97a; border:2px solid #000; }
  .librarian-avatar .hair { position:absolute; top:-3px; left:5px; width:24px; height:8px; background:#8a8a8a; border:2px solid #000; }
  .librarian-avatar .body { position:absolute; top:14px; left:2px; width:30px; height:32px; background:#5f6b3f; border:2px solid #000; }
  .librarian-avatar .glasses { position:absolute; top:6px; left:10px; width:14px; height:4px; background:#000; }
  .book-icon {
    width:28px; height:36px; background:#a6432f; border:2px solid #000; flex-shrink:0;
    opacity:0; transform: translateX(-40px) rotate(-8deg);
    animation-name: bookSlide; animation-duration:0.45s; animation-timing-function:ease-out;
    animation-delay:0.2s; animation-fill-mode:forwards;
  }
  .book-icon::after { content:''; position:absolute; margin:6px 4px; width:20px; height:2px; background:#e8dfc8; box-shadow:0 5px 0 #e8dfc8, 0 10px 0 #e8dfc8; }
  @keyframes bookSlide { to { opacity:1; transform: translateX(0) rotate(0deg); } }

  /* Estação de Marketing: dados aparecem no quadro branco */
  .whiteboard-chart {
    display:flex; align-items:flex-end; gap:7px; height:56px;
    padding:8px; background:#f2ede4; border:3px solid #000; margin-bottom:16px;
  }
  .wb-bar {
    width:16px; background:#2f7a8c; transform:scaleY(0); transform-origin:bottom;
    animation-name: barGrow; animation-duration:0.45s; animation-timing-function:ease-out; animation-fill-mode:forwards;
  }
  @keyframes barGrow { to { transform:scaleY(1); } }
</style>
</head>
<body>

<h1>ESTÚDIO ALTERANELSON</h1>
<div id="hint">Clique em uma sala pra o Alteranelson caminhar até lá ▸ setas/WASD também funcionam</div>

<div id="gameWrap">
  <canvas id="game" width="768" height="512"></canvas>
</div>

<div id="panelOverlay">
  <div id="panelBox">
    <button id="panelClose">X</button>
    <h2 id="panelTitle"></h2>
    <div id="panelSub"></div>
    <div id="panelBody"></div>
  </div>
</div>

<script>
const TILE = 32;
const GRID_W = 24;
const GRID_H = 16;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let roomData = null;
let sprite = new Image();
sprite.src = 'alteranelson_spritesheet.png';

let bgImage = new Image();
bgImage.src = 'studio_bg.png';

const FRAME_W = 169, FRAME_H = 243;
const DRAW_W = 46, DRAW_H = Math.round(46 * FRAME_H / FRAME_W);

const DIR_ROWS = { frente: 0, costas: 1, lateral_direita: 2, lateral_esquerda: 3 };

// caixa de colisão pequena, ancorada nos pés do personagem (não no sprite inteiro)
const COLLISION_HW = 11, COLLISION_HH = 7;
const WALL_MARGIN = 18;

function canMoveTo(nx, ny) {
  const left = nx - COLLISION_HW, right = nx + COLLISION_HW;
  const top = ny - COLLISION_HH, bottom = ny + COLLISION_HH;
  if (left < WALL_MARGIN || right > canvas.width - WALL_MARGIN ||
      top < WALL_MARGIN || bottom > canvas.height - WALL_MARGIN) return false;
  for (const o of obstaclesPx) {
    if (right > o.x1 && left < o.x2 && bottom > o.y1 && top < o.y2) return false;
  }
  return true;
}

// move tentando cada eixo separadamente, permitindo "deslizar" ao longo de obstáculos
function moveWithCollision(dx, dy) {
  const nx = player.x + dx;
  if (canMoveTo(nx, player.y)) player.x = nx;
  const ny = player.y + dy;
  if (canMoveTo(player.x, ny)) player.y = ny;
}

const player = {
  x: 3 * TILE + TILE/2,
  y: 5 * TILE + TILE/2,
  targetX: null,
  targetY: null,
  speed: 90, // px/seg
  dir: 'frente',
  frame: 0,
  frameTimer: 0,
  moving: false
};

let rooms = [];
let obstaclesPx = [];

fetch('casinhas.json')
  .then(r => r.json())
  .then(data => {
    roomData = data;
    player.x = data.map.spawnPoint.x * TILE + TILE/2;
    player.y = data.map.spawnPoint.y * TILE + TILE/2;
    rooms = data.salas.map(s => ({
      ...s,
      px: s.posicaoMapa.x * TILE,
      py: s.posicaoMapa.y * TILE,
      pw: s.size.w * TILE,
      ph: s.size.h * TILE,
      gx: s.portaGatilho.x,
      gy: s.portaGatilho.y
    }));
    obstaclesPx = (data.map.obstaculos || []).map(o => ({
      x1: o.x * TILE, y1: o.y * TILE,
      x2: (o.x + o.w) * TILE, y2: (o.y + o.h) * TILE
    }));
    requestAnimationFrame(loop);
  })
  .catch(err => {
    console.error('Erro carregando casinhas.json', err);
  });

// paleta compartilhada (usada só nos marcadores de interação agora)
const PAL = {
  screenOn: '#3ec1d3', accent: '#ffd000', black: '#1a1423', white: '#f2ede4'
};

function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawFloor() {
  // cenário completo: a imagem de fundo já traz piso, paredes e móveis prontos
  if (bgImage.complete && bgImage.naturalWidth > 0) {
    ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
  } else {
    ctx.fillStyle = '#241c38';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
}

let pulseT = 0;
const PROXIMITY_RADIUS = TILE * 2.8;

function drawRooms() {
  if (!rooms.length) return;
  pulseT += 0.05;
  const pulse = 0.5 + Math.sin(pulseT) * 0.5;

  rooms.forEach(r => {
    const gxPx = r.gx*TILE + TILE/2;
    const gyPx = r.gy*TILE + TILE/2;
    const dist = Math.hypot(player.x - gxPx, player.y - gyPx);
    const near = dist < PROXIMITY_RADIUS;
    // proximidade: 0 longe -> 1 bem em cima do ponto
    const proximity = near ? 1 - Math.max(0, dist / PROXIMITY_RADIUS) : 0;

    // halo externo cresce e clareia conforme o jogador se aproxima
    if (proximity > 0) {
      const haloR = 10 + proximity * 26 + pulse * 4;
      const grad = ctx.createRadialGradient(gxPx, gyPx, 0, gxPx, gyPx, haloR);
      grad.addColorStop(0, `rgba(62,193,211,${0.25 * proximity})`);
      grad.addColorStop(1, 'rgba(62,193,211,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(gxPx, gyPx, haloR, 0, Math.PI*2);
      ctx.fill();
    }

    // marcador central (mais forte quando perto)
    ctx.globalAlpha = 0.35 + pulse*0.4 + proximity*0.25;
    ctx.fillStyle = PAL.screenOn;
    ctx.beginPath();
    ctx.arc(gxPx, gyPx, 5 + pulse*2 + proximity*3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // nome da sala flutua e aparece conforme o jogador chega perto
    if (proximity > 0.15) {
      const labelAlpha = Math.min(1, (proximity - 0.15) / 0.5);
      const floatY = gyPx - 22 - proximity*6 - Math.sin(pulseT*1.3)*2;
      ctx.save();
      ctx.globalAlpha = labelAlpha;
      ctx.font = '7px monospace';
      ctx.textAlign = 'center';
      const label = r.ambiente.toUpperCase();
      const textW = ctx.measureText(label).width;
      ctx.fillStyle = 'rgba(10,6,20,0.75)';
      ctx.fillRect(gxPx - textW/2 - 5, floatY - 9, textW + 10, 13);
      ctx.fillStyle = PAL.accent;
      ctx.fillText(label, gxPx, floatY);
      ctx.textAlign = 'left';
      ctx.restore();
    }
  });

  updateAndDrawParticles();
}

// --- partículas: explosão de "estrelinhas" quando o jogador chega num ponto ---
let particles = [];

function spawnArrivalBurst(x, y) {
  const colors = [PAL.accent, PAL.screenOn, '#ffffff'];
  for (let i = 0; i < 14; i++) {
    const angle = (Math.PI * 2 * i) / 14 + Math.random()*0.3;
    const speed = 40 + Math.random()*60;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 20,
      life: 0,
      maxLife: 0.5 + Math.random()*0.25,
      size: 2 + Math.random()*2,
      color: colors[i % colors.length]
    });
  }
}

function updateAndDrawParticles() {
  if (!particles.length) return;
  const dt = 1/60;
  particles = particles.filter(p => p.life < p.maxLife);
  particles.forEach(p => {
    p.life += dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 90 * dt; // gravidade leve
    const t = 1 - p.life / p.maxLife;
    ctx.globalAlpha = Math.max(0, t);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * t, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

let bounceStart = null;

function drawPlayer() {
  if (!sprite.complete || sprite.naturalWidth === 0) return;
  const row = DIR_ROWS[player.dir];
  const sx = player.frame * FRAME_W;
  const sy = row * FRAME_H;

  let hop = 0;
  if (bounceStart !== null) {
    const elapsed = (performance.now() - bounceStart) / 1000;
    if (elapsed < 0.4) {
      hop = Math.sin(Math.min(elapsed / 0.4, 1) * Math.PI) * 10;
    } else {
      bounceStart = null;
    }
  }

  ctx.drawImage(
    sprite,
    sx, sy, FRAME_W, FRAME_H,
    player.x - DRAW_W/2, player.y - DRAW_H + 6 - hop, DRAW_W, DRAW_H
  );
}

function pickDirection(dx, dy) {
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0 ? 'lateral_direita' : 'lateral_esquerda';
  }
  return dy > 0 ? 'frente' : 'costas';
}

let activeRoomId = null;

function checkRoomArrival() {
  if (!rooms.length || overlay.classList.contains('active')) return;
  for (const r of rooms) {
    const gxPx = r.gx*TILE + TILE/2;
    const gyPx = r.gy*TILE + TILE/2;
    const dist = Math.hypot(player.x - gxPx, player.y - gyPx);
    if (dist < TILE*0.6 && activeRoomId !== r.id) {
      activeRoomId = r.id;
      player.targetX = null;
      player.targetY = null;
      spawnArrivalBurst(gxPx, gyPx);
      bounceStart = performance.now();
      setTimeout(() => openPanel(r), 220);
      break;
    }
  }
}

// libera a sala pra poder reabrir depois que o jogador se afasta dela
function updateActiveRoomProximity() {
  if (!activeRoomId) return;
  const r = rooms.find(rm => rm.id === activeRoomId);
  if (!r) { activeRoomId = null; return; }
  const gxPx = r.gx*TILE + TILE/2, gyPx = r.gy*TILE + TILE/2;
  if (Math.hypot(player.x - gxPx, player.y - gyPx) > TILE*1.4) activeRoomId = null;
}

let lastTime = performance.now();
function loop(t) {
  const dt = Math.min((t - lastTime) / 1000, 0.05);
  lastTime = t;

  update(dt);
  render();

  requestAnimationFrame(loop);
}

const keysDown = {};
const MOVE_KEYS = ['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'];

function update(dt) {
  const up = keysDown['w'] || keysDown['arrowup'];
  const down = keysDown['s'] || keysDown['arrowdown'];
  const left = keysDown['a'] || keysDown['arrowleft'];
  const right = keysDown['d'] || keysDown['arrowright'];
  let kvx = (right ? 1 : 0) - (left ? 1 : 0);
  let kvy = (down ? 1 : 0) - (up ? 1 : 0);
  const usingKeyboard = kvx !== 0 || kvy !== 0;

  if (usingKeyboard) {
    player.targetX = null;
    player.targetY = null;
    const len = Math.hypot(kvx, kvy) || 1;
    kvx /= len; kvy /= len;
    player.dir = pickDirection(kvx, kvy);
    moveWithCollision(kvx * player.speed * dt, kvy * player.speed * dt);
    player.moving = true;
    checkRoomArrival();
  } else if (player.targetX !== null) {
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);

    if (dist < 3) {
      player.targetX = null;
      player.targetY = null;
      player.moving = false;
      checkRoomArrival();
    } else {
      player.moving = true;
      player.dir = pickDirection(dx, dy);
      const step = Math.min(player.speed * dt, dist);
      const beforeX = player.x, beforeY = player.y;
      moveWithCollision((dx/dist) * step, (dy/dist) * step);
      // se travou contra um obstáculo (não andou nada), cancela o alvo pra não ficar "empurrando" parede
      if (Math.hypot(player.x - beforeX, player.y - beforeY) < 0.05) {
        player.targetX = null;
        player.targetY = null;
        player.moving = false;
      }
      checkRoomArrival();
    }
  } else {
    player.moving = false;
  }

  updateActiveRoomProximity();

  if (player.moving) {
    player.frameTimer += dt;
    if (player.frameTimer > 0.14) {
      player.frameTimer = 0;
      player.frame = (player.frame + 1) % 4;
    }
  } else {
    player.frame = 0;
  }
}

function render() {
  ctx.clearRect(0,0,canvas.width, canvas.height);
  drawFloor();
  drawRooms();
  drawPlayer();
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  // se clicou numa sala, anda até a porta-gatilho dela; senão anda pro ponto clicado
  const tileX = Math.floor(cx / TILE);
  const tileY = Math.floor(cy / TILE);
  const room = rooms.find(r =>
    tileX >= r.posicaoMapa.x && tileX < r.posicaoMapa.x + r.size.w &&
    tileY >= r.posicaoMapa.y && tileY < r.posicaoMapa.y + r.size.h
  );

  if (room) {
    player.targetX = room.gx*TILE + TILE/2;
    player.targetY = room.gy*TILE + TILE/2;
  } else {
    player.targetX = Math.max(TILE/2, Math.min(canvas.width - TILE/2, cx));
    player.targetY = Math.max(TILE/2, Math.min(canvas.height - TILE/2, cy));
  }
});

window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (MOVE_KEYS.includes(k)) {
    keysDown[k] = true;
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (MOVE_KEYS.includes(k)) keysDown[k] = false;
});
// segurança: se a aba perder foco no meio do movimento, solta todas as teclas
window.addEventListener('blur', () => { for (const k in keysDown) keysDown[k] = false; });

/* ---------------- Painel retrô ---------------- */
const overlay = document.getElementById('panelOverlay');
const panelTitle = document.getElementById('panelTitle');
const panelSub = document.getElementById('panelSub');
const panelBody = document.getElementById('panelBody');
document.getElementById('panelClose').addEventListener('click', closePanel);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closePanel(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

function closePanel() {
  overlay.classList.remove('active');
  panelBody.innerHTML = '';
}

function openPanel(room) {
  panelTitle.textContent = room.titulo;
  panelSub.textContent = room.ambiente.toUpperCase() + ' · ' + room.decoracao.join(' · ');
  panelBody.innerHTML = buildContentHTML(room);
  overlay.classList.add('active');
  if (room.id === 'contato') animatePhoneRing();
}

function buildContentHTML(room) {
  const c = room.conteudo;
  switch (room.id) {
    case 'sobre':
      return `
        <div class="attendant-row">
          <img src="atendente.png" alt="Atendente" style="width:46px;height:auto;image-rendering:pixelated;flex-shrink:0;">
          <div class="speech-bubble">${c.headline}</div>
        </div>
        <div class="content-reveal" style="animation-delay:0.9s;">
          <p>${c.texto}</p>
          <div>${c.stats.map(s => `<span class="stat"><b>${s.numero}</b>${s.label}</span>`).join('')}</div>
        </div>
      `;
    case 'projetos':
      return `
        <div class="pc-monitor"><div class="pc-screen"></div></div>
        <div class="content-reveal" style="animation-delay:0.75s;">
          ${c.items.map(p => `
            <div class="item-card">
              <span class="cat">${p.categoria}</span>
              <a href="${p.url}" target="_blank" rel="noopener">${p.nome} ↗</a>
            </div>`).join('')}
        </div>
      `;
    case 'videos':
      return buildTV(c.items);
    case 'materiais':
      return `
        <div class="book-delivery">
          <img src="bibliotecario.png" alt="Bibliotecário" style="width:42px;height:auto;image-rendering:pixelated;flex-shrink:0;">
          <div class="book-icon"></div>
          <div class="speech-bubble" style="animation-delay:0.5s;">Aqui está!</div>
        </div>
        <div class="content-reveal" style="animation-delay:1s;">
          <p style="color:var(--accent-2); font-family:'Press Start 2P'; font-size:9px;">E-BOOKS</p>
          ${c.ebooks.map(e => `<div class="item-card"><span class="cat">${e.subtitulo}</span><a href="${e.url}" target="_blank">${e.nome} ↗</a></div>`).join('')}
          <p style="color:var(--accent-2); font-family:'Press Start 2P'; font-size:9px; margin-top:14px;">APRESENTAÇÕES</p>
          ${c.apresentacoes.map(a => `<div class="item-card"><span class="cat">${a.tipo}</span><a href="${a.url}" target="_blank">${a.nome} ↗</a></div>`).join('')}
        </div>
      `;
    case 'skills':
      return `
        <div class="whiteboard-chart">
          <div class="wb-bar" style="height:55%; animation-delay:0.1s;"></div>
          <div class="wb-bar" style="height:85%; animation-delay:0.2s;"></div>
          <div class="wb-bar" style="height:35%; animation-delay:0.3s;"></div>
          <div class="wb-bar" style="height:70%; animation-delay:0.4s;"></div>
          <div class="wb-bar" style="height:50%; animation-delay:0.5s;"></div>
        </div>
        <div class="content-reveal" style="animation-delay:0.9s;">
          ${c.categorias.map(cat => `
            <p style="color:var(--accent-2); font-family:'Press Start 2P'; font-size:9px; margin-top:10px;">${cat.nome.toUpperCase()}</p>
            <ul>${cat.itens.map(i => `<li>${i}</li>`).join('')}</ul>
          `).join('')}
        </div>
      `;
    case 'contato':
      return `
        <div class="phone-row">
          <img id="phoneImg" src="telefone_idle.png" alt="Telefone tocando" class="phone-icon" style="width:52px;height:auto;image-rendering:pixelated;">
        </div>
        <div class="content-reveal" style="animation-delay:1.3s;">
          <p>${c.texto}</p>
          <ul>
            <li><a href="${c.email}">✉ E-mail</a></li>
            <li><a href="${c.linkedin}" target="_blank">in LinkedIn ↗</a></li>
            <li><a href="${c.portfolio}" target="_blank">Portfólio completo ↗</a></li>
            <li><a href="${c.whatsapp}" target="_blank">WhatsApp ↗</a></li>
          </ul>
        </div>
      `;
    default:
      return '<p>Conteúdo em construção.</p>';
  }
}

// alterna a imagem do telefone (idle/tocando) enquanto o ícone "chacoalha", sincronizado com a animação CSS
function animatePhoneRing() {
  const img = document.getElementById('phoneImg');
  if (!img) return;
  let toggled = false;
  const interval = setInterval(() => {
    toggled = !toggled;
    img.src = toggled ? 'telefone_tocando.png' : 'telefone_idle.png';
  }, 110);
  setTimeout(() => {
    clearInterval(interval);
    if (document.getElementById('phoneImg')) document.getElementById('phoneImg').src = 'telefone_idle.png';
  }, 1100);
}

function buildTV(videoItems) {
  const firstUrl = videoItems[0].url;
  const html = `
    <div id="tvWrap">
      <div id="tvKnobs"><div class="knob"></div><div class="knob"></div></div>
      <div id="tvScreen" class="powering-on">
        <iframe id="tvIframe" src="${firstUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <div class="scanline-overlay"></div>
        <div class="tv-static-overlay"><span>FORA DO AR</span></div>
      </div>
      <div id="tvControls">
        ${videoItems.map((v,i) => `<button class="channelBtn ${i===0?'active':''}" data-url="${v.url}">CH${i+1} ${v.nome}</button>`).join('')}
      </div>
    </div>
  `;
  setTimeout(() => {
    document.querySelectorAll('.channelBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.channelBtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const screen = document.getElementById('tvScreen');
        screen.classList.remove('powering-on');
        void screen.offsetWidth; // reflow pra reiniciar animação
        screen.classList.add('powering-on');
        document.getElementById('tvIframe').src = btn.dataset.url;
      });
    });
  }, 0);
  return html;
}
</script>
